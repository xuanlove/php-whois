<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">WHOIS 查询</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="stylesheet" href="https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/tailwindcss/2.2.19/tailwind.min.css">
    <script src="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-1-M/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/modern-screenshot@4.7.0/dist/index.min.js"></script>
    <script src="https://lf9-cdn-tos.bytecdntp.com/cdn/expire-1-M/clipboard.js/2.0.10/clipboard.min.js"></script>
    <script src="https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/i18next/21.6.12/i18next.min.js"></script>
    <script src="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-1-M/jquery-i18next/1.2.1/jquery-i18next.min.js"></script>
    <style>
        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        @keyframes rotate {
            100% {
                transform: rotate(360deg);
            }
        }

        .loading-spinner {
            animation: rotate 1.5s linear infinite;
        }

        .result-container {
            scrollbar-width: thin;
            scrollbar-color: #4B5563 #E5E7EB;
        }

        .result-container::-webkit-scrollbar {
            width: 12px;
        }

        .result-container::-webkit-scrollbar-track {
            background: #E5E7EB;
        }

        .result-container::-webkit-scrollbar-thumb {
            background-color: #4B5563;
            border-radius: 20px;
            border: 3px solid #E5E7EB;
        }

        .history-card {
            width: 300px;
            max-height: 800px;
            flex-direction: column;
        }

        .history-card>div {
            scrollbar-width: thin;
            scrollbar-color: #4B5563 #E5E7EB;
        }

        .history-card>div::-webkit-scrollbar {
            width: 8px;
        }

        .history-card>div::-webkit-scrollbar-track {
            background: #E5E7EB;
        }

        .history-card>div::-webkit-scrollbar-thumb {
            background-color: #4B5563;
            border-radius: 20px;
            border: 2px solid #E5E7EB;
        }

        .watermark {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
            color: rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #4B5563;
            /* Tailwind's gray-600 */
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .language-switcher {
            position: absolute;
            top: 10px;
            right: 10px;
        }

        .tld-modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .tld-modal {
            background-color: #fff;
            width: 90%;
            max-width: 560px;
            max-height: 80vh;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tld-list {
            scrollbar-width: thin;
            scrollbar-color: #4B5563 #E5E7EB;
        }

        .tld-list::-webkit-scrollbar {
            width: 8px;
        }

        .tld-list::-webkit-scrollbar-track {
            background: #E5E7EB;
        }

        .tld-list::-webkit-scrollbar-thumb {
            background-color: #4B5563;
            border-radius: 20px;
            border: 2px solid #E5E7EB;
        }

        @media (max-width: 640px) {
            .result-container {
                padding-bottom: 65px;
            }
        }
    </style>

</head>

<body class="bg-gray-100 flex justify-center p-0 sm:p-4 h-screen">
    <div class="language-switcher">
        <select id="languageSelect"
            class="bg-white border border-gray-300 rounded-md text-gray-700 py-1 px-2 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            <option value="zh-CN">简体中文</option>
            <option value="zh-TW">繁體中文</option>
            <option value="en">English</option>
            <option value="ru">Русский</option>
            <option value="es">Español</option>
        </select>
    </div>
    <div class="flex flex-grow max-w-5xl w-full">
        <div class="bg-white p-2 sm:p-6 md:p-8 rounded-lg shadow-md flex flex-col w-full h-full">
            <h1 class="text-2xl sm:text-3xl font-bold text-left sm:text-center mb-4 sm:mb-6 text-gray-800"
                data-i18n="title">WHOIS 查询</h1>
            <form id="whois-form" class="mb-4">
                <div class="flex relative">
                    <input type="text" id="domain" name="domain" required placeholder="请输入IP或者域名"
                        data-i18n="[placeholder]inputPlaceholder"
                        class="flex-grow px-3 py-2 bg-white border border-gray-300 rounded-l-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                    <button type="button" id="clear-input"
                        class="absolute right-24 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none mr-4">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                                clip-rule="evenodd" />
                        </svg>
                    </button>
                    <button type="submit" id="submit-btn"
                        class="flex items-center justify-center w-24 border border-transparent rounded-r-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors duration-200">
                        <span data-i18n="search">查询</span>
                        <svg class="loading-spinner ml-2 h-5 w-5 hidden" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"
                                fill="none"></circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                    </button>
                </div>
            </form>
            <div class="mb-4 flex justify-end">
                <button type="button" id="openTldBtn"
                    class="text-sm text-indigo-600 hover:text-indigo-800 focus:outline-none"
                    data-i18n="knownTlds">已知域名后缀</button>
            </div>
            <div id="resultDiv" class="hidden flex-grow overflow-hidden">
                <div class="h-full overflow-y-auto result-container pb-16 sm:pb-0">
                    <div id="importantInfo"></div>
                    <div id="originalInfo"></div>
                </div>
            </div>
        </div>

        <div id="history" class="history-card bg-white shadow-md ml-0 sm:ml-4 hidden sm:flex flex-col">
            <div class="flex justify-between items-center p-4 pb-2">
                <h2 class="text-lg font-semibold text-gray-800" data-i18n="recentSearches">最近查询</h2>
                <button type="button" id="clearHistoryBtn" class="text-xs text-red-500 hover:text-red-700 focus:outline-none" data-i18n="clearHistory">清空历史</button>
            </div>
            <div class="px-4 pb-2">
                <input type="text" id="historySearch" data-i18n="[placeholder]historySearchPlaceholder"
                    placeholder="搜索历史记录"
                    class="w-full px-2 py-1 text-sm bg-white border border-gray-300 rounded-md focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div class="flex-grow overflow-y-auto px-4 pb-4">
                <ul id="history-list" class="space-y-2"></ul>
            </div>
        </div>
    </div>

    <div id="tldModal" class="tld-modal-overlay hidden">
        <div class="tld-modal shadow-xl">
            <div class="flex justify-between items-center p-4 border-b border-gray-200">
                <h3 class="text-lg font-bold text-gray-800" data-i18n="knownTlds">已知域名后缀</h3>
                <button type="button" id="closeTldBtn" class="text-gray-400 hover:text-gray-600 focus:outline-none">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="p-4 border-b border-gray-200">
                <input type="text" id="tldFilter" data-i18n="[placeholder]tldFilterPlaceholder"
                    placeholder="搜索域名后缀或 WHOIS 服务器"
                    class="w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                <p id="tldCount" class="text-xs text-gray-500 mt-2"></p>
            </div>
            <div id="tldList" class="tld-list flex-grow overflow-y-auto p-4 space-y-1"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        $(document).ready(function () {
            const HISTORY_KEY = 'whoisHistory';
            const MAX_HISTORY = 500;

            let tldMap = null; // 缓存 whois.json 中的 TLD -> WHOIS 服务器映射
            let currentXhr = null; // 当前正在进行的 AJAX 请求，发起新请求前会 abort 旧请求

            const $form = $('#whois-form');
            const $domain = $('#domain');
            const $submitBtn = $('#submit-btn');
            const $resultDiv = $('#resultDiv');
            const $importantInfo = $('#importantInfo');
            const $originalInfo = $('#originalInfo');
            const $historyList = $('#history-list');
            const $clearInput = $('#clear-input');
            const $historySearch = $('#historySearch');
            const $clearHistoryBtn = $('#clearHistoryBtn');
            const $tldModal = $('#tldModal');
            const $tldList = $('#tldList');
            const $tldFilter = $('#tldFilter');
            const $tldCount = $('#tldCount');

            function init() {
                bindEvents();
                initClipboard();
                checkUrlForDomain();
                updateSearchHistory();
                toggleClearButton();
                initI18n();
                loadTldMap(function () { }); // 后台预加载，供提交时校验后缀使用
                registerServiceWorker();
            }

            function registerServiceWorker() {
                if ('serviceWorker' in navigator) {
                    window.addEventListener('load', function () {
                        navigator.serviceWorker.register('/service-worker.js').catch(function () {
                            // 注册失败静默处理，不影响主功能
                        });
                    });
                }
            }

            function bindEvents() {
                $form.submit(handleFormSubmit);
                $(document).on('click', '.search-again', handleSearchAgain);
                $(document).on('click', '#saveScreenshot', handleSaveScreenshot);
                $domain.on('input', toggleClearButton);
                $clearInput.on('click', clearInput);
                $historySearch.on('input', updateSearchHistory);
                $clearHistoryBtn.on('click', clearHistory);
                $(document).on('keydown', handleGlobalKeydown);
                $('#languageSelect').on('change', handleLanguageChange);
                $('#openTldBtn').on('click', openTldModal);
                $('#closeTldBtn').on('click', closeTldModal);
                $tldFilter.on('input', renderTldList);
                $(document).on('click', '.tld-item', handleTldItemClick);
                $tldModal.on('click', function (e) {
                    if (e.target === this) closeTldModal();
                });
            }

            function handleFormSubmit(e) {
                e.preventDefault();
                const domain = $domain.val().trim();
                if (!domain) return;
                // 校验域名后缀是否已知（IP 地址跳过）
                if (!filter_var_is_ip(domain) && !isKnownTld(domain)) {
                    showToast('unknownTldWarning');
                }
                performWhoisLookup(domain);
            }

            // 模拟 PHP 的 FILTER_VALIDATE_IP
            function filter_var_is_ip(value) {
                if (/^\d{1,3}(\.\d{1,3}){3}$/.test(value)) {
                    return value.split('.').every(n => +n >= 0 && +n <= 255);
                }
                // IPv6 简单判断
                return /^[0-9a-fA-F:]+$/.test(value) && value.includes(':');
            }

            // 判断域名后缀是否在 whois.json 中已知
            function isKnownTld(domain) {
                if (!tldMap) return true; // 数据未加载完成时不拦截
                const parts = domain.toLowerCase().split('.');
                if (parts.length < 2) return false;
                // 优先匹配多级后缀（如 .co.uk 不在表中，则取最后一段）
                for (let i = 1; i < parts.length; i++) {
                    const candidate = parts.slice(i).join('.');
                    if (Object.prototype.hasOwnProperty.call(tldMap, candidate)) {
                        return true;
                    }
                }
                return false;
            }

            // 加载 whois.json（带缓存）
            function loadTldMap(callback) {
                if (tldMap) {
                    callback(tldMap);
                    return;
                }
                $.ajax({
                    url: 'whois.json',
                    method: 'GET',
                    dataType: 'json',
                    success: function (data) {
                        tldMap = data || {};
                        callback(tldMap);
                    },
                    error: function () {
                        tldMap = {};
                        callback(tldMap);
                    }
                });
            }

            function openTldModal() {
                loadTldMap(function () {
                    $tldFilter.val('');
                    renderTldList();
                    $tldModal.removeClass('hidden');
                });
            }

            function closeTldModal() {
                $tldModal.addClass('hidden');
            }

            function renderTldList() {
                const keyword = $tldFilter.val().trim().toLowerCase();
                const entries = Object.entries(tldMap).filter(function ([tld, server]) {
                    if (!keyword) return true;
                    return tld.indexOf(keyword) !== -1 || (server && server.toLowerCase().indexOf(keyword) !== -1);
                });

                const total = Object.keys(tldMap).length;
                $tldCount.text(i18next.t('tldCount', { count: entries.length, total: total }));

                const html = entries.map(function ([tld, server]) {
                    const serverText = server || i18next.t('notAvailable');
                    const serverClass = server ? 'text-gray-600' : 'text-gray-400 italic';
                    return `
                        <div class="tld-item flex justify-between items-center bg-gray-50 hover:bg-indigo-50 rounded-md px-3 py-2 cursor-pointer" data-tld="${tld}">
                            <span class="text-gray-800 font-medium">.${tld}</span>
                            <span class="text-xs ${serverClass} break-all ml-2 text-right">${serverText}</span>
                        </div>
                    `;
                }).join('');
                $tldList.html(html || `<p class="text-sm text-gray-500 text-center" data-i18n="noTldMatch">无匹配的后缀</p>`);
            }

            function handleTldItemClick() {
                const tld = $(this).data('tld');
                $domain.val('example.' + tld);
                toggleClearButton();
                closeTldModal();
                $domain.focus();
            }

            function handleSearchAgain() {
                const domain = $(this).data('domain');
                performWhoisLookup(domain);
            }

            function performWhoisLookup(domain) {
                // 取消上一个未完成的请求，避免旧响应覆盖新结果
                if (currentXhr) {
                    currentXhr.abort();
                }
                updateButtonState(true);
                updateUrl(domain);
                $domain.val(domain);
                toggleClearButton();

                currentXhr = $.ajax({
                    url: 'whois.php',
                    method: 'GET',
                    data: { domain },
                    dataType: 'json',
                    success: function (response) {
                        handleWhoisResponse(response);
                    },
                    error: function (jqXHR, textStatus) {
                        // abort 触发的 error 不提示
                        if (textStatus !== 'abort') {
                            handleWhoisError(jqXHR, textStatus);
                        }
                    },
                    complete: () => {
                        currentXhr = null;
                        updateButtonState(false);
                        updateContent();
                    }
                });
            }

            function handleWhoisResponse(response) {
                if (response.whois) {
                    const { importantInfoHtml, originalInfoHtml } = formatWhoisInfo(response.whois);
                    $importantInfo.html(importantInfoHtml);
                    $originalInfo.html(originalInfoHtml);
                    $resultDiv.removeClass('hidden');
                    updateSearchHistory($domain.val().trim());
                } else if (response.error) {
                    showError(`错误: ${response.error}`);
                }
            }

            function getLabel(key) {
                return i18next.t(key, { defaultValue: key });
            }

            function handleWhoisError(jqXHR, textStatus) {
                // 429 限流时给出友好提示
                if (jqXHR && jqXHR.status === 429) {
                    showError(i18next.t('tooManyRequests'));
                    return;
                }
                showError(`请求失败: ${textStatus}`);
            }

            function formatWhoisInfo(whoisData) {
                const whoisLines = whoisData.split('\n');
                let importantInfo = {};

                // 提取重要信息（所有 value 存储为已转义的安全 HTML 字符串）
                whoisLines.forEach(line => {
                    const [key, ...valueParts] = line.split(':');
                    const value = valueParts.join(':').trim();

                    if (key && value) {
                        const lowerKey = key.trim().toLowerCase();
                        const safe = escapeHtml(value);
                        switch (lowerKey) {
                            case '域名':
                            case 'domain name':
                            case 'domain':
                                importantInfo.domainName = safe;
                                break;
                            case '注册商':
                            case 'registrar':
                            case 'sponsoring registrar':
                                importantInfo.registrar = safe;
                                break;
                            case 'whois server':
                                importantInfo.whoisServer = safe;
                                break;
                            case '更新日':
                            case 'updated date':
                                importantInfo.updatedDate = escapeHtml(convertToUTC8(value));
                                break;
                            case '注册日':
                            case 'creation date':
                            case 'registration time':
                                importantInfo.creationDate = escapeHtml(convertToUTC8(value));
                                break;
                            case 'registry expiry date':
                            case 'expiration time':
                                importantInfo.expiryDate = escapeHtml(convertToUTC8(value));
                                break;
                            case 'iana_id':
                                importantInfo.ianaId = safe;
                                break;
                            case '状态':
                            case 'domain status':
                            case 'status':
                                importantInfo.status = value.split(' ').map(escapeHtml).join("<br>");
                                break;
                            case 'name server':
                            case 'ns':
                                importantInfo.nameServers = importantInfo.nameServers
                                    ? importantInfo.nameServers + '<br>' + safe
                                    : safe;
                                break;
                            case 'dnssec':
                                importantInfo.dnssec = safe;
                                break;
                            case '注册人':
                            case 'registrant':
                                importantInfo.registrant = safe;
                                break;
                            case '注册人邮箱':
                            case 'registrant contact email':
                                importantInfo.registrantEmail = safe;
                                break;
                        }
                    }
                });

                const registrationPeriod = calculatePeriod(importantInfo.creationDate, 'registrationPeriod');
                const remainingTime = calculatePeriod(importantInfo.expiryDate, 'remainingTime');

                // 生成重要信息HTML（value 经 escapeHtml 转义，防止 WHOIS 数据中的 HTML 注入）
                let importantInfoHtml = `
                    <div id="importantInfoCard" class="bg-blue-50 rounded-lg p-2 sm:p-4 mb-4 sm:mb-6 relative">
                        <div class="flex justify-between items-center mb-2 sm:mb-3">
                            <h3 class="text-lg font-bold text-blue-700" data-i18n="whoisOverview">WHOIS 信息概览</h3>
                            <button id="saveScreenshot" class="text-blue-600 hover:text-blue-800 focus:outline-none">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                            </button>
                        </div>
                        <div class="space-y-2">
                            ${Object.entries(importantInfo).map(([key, value]) => `
                                <div class="flex flex-col sm:flex-row">
                                    <span class="text-gray-600 font-semibold sm:w-32 sm:flex-shrink-0 sm:text-right sm:pr-2" data-i18n="${escapeHtml(key)}">${escapeHtml(getLabel(key))}：</span>
                                    <span class="text-gray-800 break-words sm:flex-grow flex items-center">
                                        ${value}
                                        ${key === 'domainName' ? registrationPeriod : ''}
                                        ${key === 'expiryDate' ? remainingTime : ''}
                                    </span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;

                // 生成原始信息的HTML（whoisData 转义后插入）
                let originalInfoHtml = `
                    <div class="bg-gray-50 rounded-lg p-2 sm:p-4">
                        <div class="flex justify-between items-center mb-2 sm:mb-3">
                            <h3 class="text-lg font-bold text-gray-700" data-i18n="originalWhois">WHOIS 原始信息</h3>
                            <button id="copyOriginalInfo" class="text-blue-600 hover:text-blue-800 focus:outline-none" data-clipboard-target="#originalInfoContent">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                </svg>
                            </button>
                        </div>
                        <pre id="originalInfoContent" class="whitespace-pre-wrap text-sm break-words">${escapeHtml(whoisData)}</pre>
                    </div>
                `;

                return { importantInfoHtml, originalInfoHtml };
            }

            // HTML 转义，防止 WHOIS 数据中的 HTML/JS 注入
            function escapeHtml(str) {
                if (str === null || str === undefined) return '';
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#39;');
            }

            // 将 WHOIS 日期转换为本地时区显示（浏览器自动处理时区偏移）
            function convertToUTC8(dateString) {
                const date = new Date(dateString);
                if (isNaN(date.getTime())) {
                    return dateString; // 如果日期无效，返回原始字符串
                }
                // 用浏览器本地时区格式化，由 Date 解析的偏移量决定
                const pad = n => String(n).padStart(2, '0');
                const y = date.getFullYear();
                const m = pad(date.getMonth() + 1);
                const d = pad(date.getDate());
                const hh = pad(date.getHours());
                const mm = pad(date.getMinutes());
                const ss = pad(date.getSeconds());
                const tzOffset = -date.getTimezoneOffset() / 60;
                const tzSign = tzOffset >= 0 ? '+' : '-';
                const tzStr = `UTC${tzSign}${Math.abs(tzOffset)}`;
                return `${y}-${m}-${d} ${hh}:${mm}:${ss} (${tzStr})`;
            }

            function calculatePeriod(dateString, type) {
                if (!dateString) return '';

                const date = new Date(dateString);
                const currentDate = new Date();
                const diffTime = Math.abs(type === 'remainingTime' ? date - currentDate : currentDate - date);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                let time, unit;
                if (diffDays >= 365) {
                    time = Math.floor(diffDays / 365);
                    unit = 'years';
                } else if (diffDays >= 30) {
                    time = Math.floor(diffDays / 30);
                    unit = 'months';
                } else {
                    time = diffDays;
                    unit = 'days';
                }

                return `<span class="inline-flex items-center justify-center text-xs text-white bg-${type === 'remainingTime' ? 'green' : 'blue'}-600 rounded px-1 ml-1 align-middle" style="height: 1.5em; line-height: 1;" data-i18n="${type}" data-time="${time}" data-unit="${unit}"></span>`;
            }

            function updateSearchHistory(domain) {
                let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
                if (domain?.trim()) {
                    history = [domain, ...history.filter(item => item !== domain)].slice(0, MAX_HISTORY);
                    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
                }
                renderHistory(history);
            }

            function renderHistory(history) {
                // 应用搜索框过滤
                const keyword = ($historySearch.val() || '').trim().toLowerCase();
                const filtered = keyword
                    ? history.filter(item => String(item).toLowerCase().indexOf(keyword) !== -1)
                    : history;

                const historyHtml = filtered.length
                    ? filtered.map(item => {
                        const safe = escapeHtml(item);
                        return `
                        <li class="bg-gray-50 p-2 rounded-md">
                            <span class="text-xs sm:text-sm text-gray-600 block mb-1">${safe}</span>
                            <button class="search-again text-xs text-indigo-600 hover:text-indigo-800" data-domain="${safe}" data-i18n="searchAgain">再次查询</button>
                        </li>
                    `;
                    }).join('')
                    : `<li class="text-xs sm:text-sm text-gray-500 text-center" data-i18n="noHistory">暂无历史查询记录</li>`;
                $historyList.html(historyHtml);
            }

            function clearHistory() {
                if (!confirm(i18next.t('confirmClearHistory'))) return;
                localStorage.removeItem(HISTORY_KEY);
                $historySearch.val('');
                renderHistory([]);
            }

            function updateButtonState(isLoading) {
                const $submitText = $submitBtn.find('span');
                const $spinner = $submitBtn.find('svg');
                $submitBtn.prop('disabled', isLoading)
                    .toggleClass('bg-indigo-600 hover:bg-indigo-700 text-white', !isLoading)
                    .toggleClass('bg-gray-300 text-gray-800', isLoading);
                $submitText.data('data-i18n', isLoading ? 'searching' : 'search');
                $spinner.toggleClass('hidden', !isLoading);
            }

            function updateUrl(domain) {
                if (domain) {
                    history.pushState(null, '', '/' + encodeURIComponent(domain));
                }
            }

            function showError(message) {
                $importantInfo.html('');
                $originalInfo.html(`<p class="text-red-500">${escapeHtml(message)}</p>`);
                $resultDiv.removeClass('hidden');
            }

            function showToast(message, duration = 3000) {
                const toast = $('#toast');
                toast.text(i18next.t(message)).css('opacity', 1);
                setTimeout(() => {
                    toast.css('opacity', 0);
                }, duration);
            }

            function initClipboard() {
                new ClipboardJS('#copyOriginalInfo', {
                    text: function () {
                        return $('#originalInfoContent').text();
                    }
                }).on('success', function () {
                    showToast('copiedToClipboard');
                }).on('error', function () {
                    showToast('copyFailed');
                });
            }

            function handleSaveScreenshot() {
                const element = document.getElementById('importantInfoCard');
                const currentDomain = window.location.hostname;
                const currentQueryDomain = $('#domain').val().trim();
                const $saveScreenshotBtn = $('#saveScreenshot');

                // 临时隐藏截图按钮
                $saveScreenshotBtn.hide();

                // 使用 modern-screenshot 进行截图
                modernScreenshot.domToPng(element, {
                    quality: 1,
                    backgroundColor: '#ffffff'
                })
                    .then(function (dataUrl) {
                        // 创建一个临时的 canvas 元素来添加水印
                        const img = new Image();
                        img.onload = function () {
                            const canvas = document.createElement('canvas');
                            canvas.width = img.width;
                            canvas.height = img.height;
                            const ctx = canvas.getContext('2d');

                            // 绘制原始图像
                            ctx.drawImage(img, 0, 0);

                            // 添加水印
                            ctx.font = '12px Arial';
                            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                            const watermarkText = '© ' + new Date().getFullYear() + ' ' + currentDomain;
                            const textWidth = ctx.measureText(watermarkText).width;
                            ctx.fillText(watermarkText, canvas.width - textWidth - 10, canvas.height - 10);

                            // 创建下载链接
                            const link = document.createElement('a');
                            link.download = `whois_${currentQueryDomain}.png`;
                            link.href = canvas.toDataURL('image/png');
                            link.click();

                            // 截图完成后显示截图按钮
                            $saveScreenshotBtn.show();
                        };
                        img.src = dataUrl;
                    })
                    .catch(function (error) {
                        console.error('截图失败:', error);
                        showToast('screenshotFailed');
                        // 发生错误时也要显示截图按钮
                        $saveScreenshotBtn.show();
                    });
            }

            function checkUrlForDomain() {
                const path = window.location.pathname;
                const domain = decodeURIComponent(path.substring(1)); // 移除开头的斜杠
                if (domain) {
                    $domain.val(domain);
                    performWhoisLookup(domain);
                }
            }

            function toggleClearButton() {
                $clearInput.toggle(!!$domain.val());
            }

            function clearInput() {
                $domain.val('').focus();
                toggleClearButton();
            }

            function handleGlobalKeydown(e) {
                if (e.key === 'Delete') {
                    e.preventDefault();
                    clearInput();
                }
            }

            function initI18n() {
                const userLang = navigator.language || navigator.userLanguage; // 获取浏览器语言
                const supported = ['zh-CN', 'zh-TW', 'en', 'ru', 'es'];
                const defaultLang = supported.includes(userLang) ? userLang : 'zh-CN'; // 检查是否支持该语言，不支持则默认 'zh-CN'

                // 使用 i18next 的 http backend 异步加载 locales/<lang>.json
                i18next.use({
                    type: 'backend',
                    read: function (language, namespace, callback) {
                        $.ajax({
                            url: 'locales/' + language + '.json',
                            method: 'GET',
                            dataType: 'json',
                            success: function (data) {
                                callback(null, data);
                            },
                            error: function () {
                                callback('load failed', null);
                            }
                        });
                    }
                }).init({
                    lng: defaultLang,
                    fallbackLng: 'zh-CN',
                    ns: ['translation'],
                    defaultNS: 'translation'
                }, function (err, t) {
                    updateContent();
                });
            }

            function updateContent() {
                // 更新其他内容的翻译
                $('[data-i18n]').each(function () {
                    const $this = $(this);
                    const key = $this.data('i18n');
                    if (key === 'remainingTime' || key === 'registrationPeriod') {
                        const time = $this.data('time');
                        const unit = $this.data('unit');
                        $this.html(i18next.t(key, { time: time, unit: i18next.t(unit) }));
                    } else if (key.includes('[placeholder]')) {
                        // 特殊处理 placeholder 属性
                        const placeholderKey = key.replace('[placeholder]', '');
                        $this.attr('placeholder', i18next.t(placeholderKey));
                    } else {
                        $this.text(i18next.t(key));
                    }
                });
            }

            function handleLanguageChange() {
                i18next.changeLanguage(this.value, function () {
                    updateContent();
                });
            }

            init();
        });
    </script>
</body>

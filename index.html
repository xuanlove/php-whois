<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">WHOIS 查询</title>
    <script src="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-1-M/jquery/3.6.0/jquery.min.js"></script>
    <style>
        :root {
            --bg: #f4f5f7;
            --card: #ffffff;
            --text: #1f2937;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --primary-soft: #eef2ff;
            --success: #10b981;
            --success-soft: #ecfdf5;
            --danger: #ef4444;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.12);
            --radius: 14px;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
        }

        /* 顶栏：毛玻璃 */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 30;
            backdrop-filter: saturate(180%) blur(14px);
            -webkit-backdrop-filter: saturate(180%) blur(14px);
            background: rgba(255, 255, 255, 0.78);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 700;
            color: var(--text);
        }

        .brand-logo {
            width: 32px;
            height: 32px;
            border-radius: 9px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.35);
        }

        .topbar-actions { display: flex; align-items: center; gap: 8px; }

        .lang-select, .history-toggle {
            height: 36px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text);
            font-size: 14px;
            padding: 0 10px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .lang-select:hover, .history-toggle:hover { border-color: var(--primary); color: var(--primary); }
        .lang-select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }

        .history-toggle { display: none; align-items: center; gap: 6px; }

        /* 主区域：桌面双栏 */
        .layout {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 20px;
            padding: 20px;
            max-width: 1180px;
            width: 100%;
            margin: 0 auto;
            min-height: 0;
        }

        .main-col { display: flex; flex-direction: column; gap: 16px; min-width: 0; }

        /* 搜索卡片 */
        .search-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 18px;
        }
        .search-wrap { display: flex; gap: 10px; position: relative; }
        .search-input {
            flex: 1;
            height: 48px;
            border-radius: 12px;
            border: 1.5px solid var(--border);
            padding: 0 44px 0 16px;
            font-size: 15px;
            color: var(--text);
            background: #fff;
            transition: all 0.15s ease;
        }
        .search-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-soft); }
        .search-clear {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            cursor: pointer;
            color: var(--text-muted);
            width: 22px; height: 22px;
            display: none;
            align-items: center; justify-content: center;
            border-radius: 50%;
        }
        .search-clear:hover { background: var(--border); color: var(--text); }
        .search-clear.visible { display: flex; }

        .search-btn {
            height: 48px;
            padding: 0 22px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.15s ease;
            white-space: nowrap;
        }
        .search-btn:hover:not(:disabled) { background: var(--primary-hover); }
        .search-btn:disabled { opacity: 0.65; cursor: not-allowed; }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 结果区 */
        .result-area { display: flex; flex-direction: column; gap: 16px; }

        .empty-state {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            padding: 60px 24px;
            text-align: center;
            color: var(--text-muted);
        }
        .empty-icon {
            width: 56px; height: 56px;
            margin: 0 auto 16px;
            border-radius: 16px;
            background: var(--primary-soft);
            color: var(--primary);
            display: flex; align-items: center; justify-content: center;
        }
        .empty-state h3 { margin: 0 0 6px; font-size: 16px; color: var(--text); font-weight: 600; }
        .empty-state p { margin: 0; font-size: 14px; }

        .overview-card, .raw-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .card-head {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .card-head h3 { margin: 0; font-size: 15px; font-weight: 700; color: var(--text); }

        .badge {
            display: inline-flex;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 999px;
            background: var(--success-soft);
            color: var(--success);
        }

        .info-grid { padding: 8px 20px 16px; }
        .info-row {
            display: grid;
            grid-template-columns: 130px 1fr;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px dashed var(--border);
            align-items: start;
        }
        .info-row:last-child { border-bottom: none; }
        .info-key { font-size: 13px; color: var(--text-muted); font-weight: 500; }
        .info-val { font-size: 14px; color: var(--text); word-break: break-all; line-height: 1.6; }

        .pill {
            display: inline-block;
            background: var(--primary-soft);
            color: var(--primary);
            font-size: 12px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 6px;
            margin-left: 6px;
        }
        .pill.green { background: var(--success-soft); color: var(--success); }

        .raw-toggle {
            background: transparent;
            border: none;
            color: var(--primary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            border-radius: 8px;
        }
        .raw-toggle:hover { background: var(--primary-soft); }
        .chevron { transition: transform 0.2s ease; }
        .raw-toggle.expanded .chevron { transform: rotate(180deg); }

        .raw-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .raw-body.open { max-height: 800px; }
        .raw-content {
            margin: 0;
            padding: 16px 20px;
            font-family: "SF Mono", "Monaco", "Consolas", monospace;
            font-size: 12.5px;
            line-height: 1.7;
            color: var(--text);
            white-space: pre-wrap;
            word-break: break-all;
            background: #fafafa;
            max-height: 480px;
            overflow-y: auto;
        }

        .error-box {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        /* 历史侧边栏 */
        .history-panel {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            align-self: start;
            position: sticky;
            top: 76px;
            max-height: calc(100vh - 96px);
        }
        .history-head {
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .history-head h3 { margin: 0; font-size: 14px; font-weight: 700; }
        .history-clear {
            font-size: 12px;
            color: var(--danger);
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .history-clear:hover { background: #fef2f2; }

        .history-list {
            list-style: none;
            margin: 0;
            padding: 8px;
            overflow-y: auto;
            flex: 1;
        }
        .history-item {
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.12s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .history-item:hover { background: var(--primary-soft); }
        .history-domain { font-size: 13.5px; color: var(--text); font-weight: 500; word-break: break-all; }
        .history-time { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
        .history-empty { text-align: center; color: var(--text-muted); font-size: 13px; padding: 30px 12px; }

        /* 移动端历史抽屉 */
        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 40;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease, visibility 0.25s ease;
        }
        .drawer-overlay.open { opacity: 1; visibility: visible; }

        .history-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            border-radius: 20px 20px 0 0;
            box-shadow: var(--shadow-lg);
            z-index: 50;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .history-drawer.open { transform: translateY(0); }
        .drawer-handle {
            width: 40px; height: 4px;
            background: var(--border);
            border-radius: 999px;
            margin: 10px auto 4px;
        }
        .drawer-head {
            padding: 8px 18px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* 响应式 */
        @media (max-width: 860px) {
            .layout { grid-template-columns: 1fr; padding: 14px; gap: 14px; }
            .history-panel { display: none; }
            .history-toggle { display: flex; }
            .info-row { grid-template-columns: 110px 1fr; gap: 8px; }
            .search-btn span.label { display: none; }
            .search-btn { padding: 0 16px; }
            .topbar { padding: 12px 14px; }
        }
        @media (max-width: 480px) {
            .info-row { grid-template-columns: 1fr; gap: 2px; }
            .info-key { font-size: 12px; }
            .brand span { display: none; }
        }
    </style>
</head>

<body>
    <header class="topbar">
        <div class="brand">
            <div class="brand-logo">W</div>
            <span data-i18n="title">WHOIS 查询</span>
        </div>
        <div class="topbar-actions">
            <button class="history-toggle" id="historyToggle">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
                <span data-i18n="history">历史</span>
            </button>
            <select class="lang-select" id="langSelect">
                <option value="zh-CN">简体中文</option>
                <option value="zh-TW">繁體中文</option>
                <option value="en">English</option>
                <option value="ru">Русский</option>
                <option value="es">Español</option>
            </select>
        </div>
    </header>

    <div class="layout">
        <main class="main-col">
            <div class="search-card">
                <form id="whoisForm" class="search-wrap">
                    <input type="text" id="domainInput" class="search-input" required
                        data-i18n="[placeholder]inputPlaceholder" placeholder="请输入域名或 IP 地址" autocomplete="off">
                    <button type="button" class="search-clear" id="clearBtn" aria-label="clear">
                        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/></svg>
                    </button>
                    <button type="submit" class="search-btn" id="submitBtn">
                        <span class="spinner" id="spinner"></span>
                        <span class="label" data-i18n="search">查询</span>
                    </button>
                </form>
            </div>

            <div class="result-area" id="resultArea">
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    </div>
                    <h3 data-i18n="emptyTitle">开始你的第一次查询</h3>
                    <p data-i18n="emptyDesc">输入域名或 IP 地址，查看 WHOIS 信息</p>
                </div>
            </div>
        </main>

        <!-- 桌面侧边栏 -->
        <aside class="history-panel" id="historyPanel">
            <div class="history-head">
                <h3 data-i18n="history">查询历史</h3>
                <button class="history-clear" id="clearHistory" data-i18n="clearHistory">清空</button>
            </div>
            <ul class="history-list" id="historyList"></ul>
        </aside>
    </div>

    <!-- 移动端抽屉 -->
    <div class="drawer-overlay" id="drawerOverlay"></div>
    <div class="history-drawer" id="historyDrawer">
        <div class="drawer-handle"></div>
        <div class="drawer-head">
            <h3 data-i18n="history">查询历史</h3>
            <button class="history-clear" id="clearHistoryMobile" data-i18n="clearHistory">清空</button>
        </div>
        <ul class="history-list" id="historyListMobile"></ul>
    </div>

    <script>
        $(function () {
            const HISTORY_KEY = 'whoisHistory';
            const MAX_HISTORY = 50;
            const STORAGE_LANG = 'whoisLang';

            const i18n = {
                'zh-CN': {
                    title: 'WHOIS 查询', inputPlaceholder: '请输入域名或 IP 地址', search: '查询', searching: '查询中',
                    history: '查询历史', clearHistory: '清空', clearConfirm: '确定清空所有历史记录吗？',
                    emptyTitle: '开始你的第一次查询', emptyDesc: '输入域名或 IP 地址，查看 WHOIS 信息',
                    overview: '信息概览', rawInfo: '原始 WHOIS', expandRaw: '展开原文', collapseRaw: '收起原文',
                    noHistory: '暂无查询历史',
                    domainName: '域名', registrar: '注册商', whoisServer: 'WHOIS 服务器',
                    updatedDate: '更新日期', creationDate: '注册日期', expiryDate: '过期日期',
                    status: '状态', nameServers: '域名服务器', dnssec: 'DNSSEC',
                    registrant: '注册人', registrantEmail: '注册人邮箱', registryDomainId: '注册局ID',
                    years: '年', months: '个月', days: '天', registered: '已注册', remaining: '剩余',
                    errorPrefix: '错误', requestFailed: '请求失败'
                },
                'zh-TW': {
                    title: 'WHOIS 查詢', inputPlaceholder: '請輸入域名或 IP 地址', search: '查詢', searching: '查詢中',
                    history: '查詢歷史', clearHistory: '清空', clearConfirm: '確定清空所有歷史記錄嗎？',
                    emptyTitle: '開始你的第一次查詢', emptyDesc: '輸入域名或 IP 地址，查看 WHOIS 信息',
                    overview: '信息概覽', rawInfo: '原始 WHOIS', expandRaw: '展開原文', collapseRaw: '收起原文',
                    noHistory: '暫無查詢歷史',
                    domainName: '域名', registrar: '註冊商', whoisServer: 'WHOIS 伺服器',
                    updatedDate: '更新日期', creationDate: '註冊日期', expiryDate: '過期日期',
                    status: '狀態', nameServers: '域名伺服器', dnssec: 'DNSSEC',
                    registrant: '註冊人', registrantEmail: '註冊人郵箱', registryDomainId: '註冊局ID',
                    years: '年', months: '個月', days: '天', registered: '已註冊', remaining: '剩餘',
                    errorPrefix: '錯誤', requestFailed: '請求失敗'
                },
                'en': {
                    title: 'WHOIS Lookup', inputPlaceholder: 'Enter domain or IP address', search: 'Search', searching: 'Searching',
                    history: 'History', clearHistory: 'Clear', clearConfirm: 'Clear all history?',
                    emptyTitle: 'Start your first lookup', emptyDesc: 'Enter a domain or IP to view WHOIS info',
                    overview: 'Overview', rawInfo: 'Raw WHOIS', expandRaw: 'Expand', collapseRaw: 'Collapse',
                    noHistory: 'No history yet',
                    domainName: 'Domain', registrar: 'Registrar', whoisServer: 'WHOIS Server',
                    updatedDate: 'Updated', creationDate: 'Created', expiryDate: 'Expires',
                    status: 'Status', nameServers: 'Name Servers', dnssec: 'DNSSEC',
                    registrant: 'Registrant', registrantEmail: 'Registrant Email', registryDomainId: 'Registry ID',
                    years: 'y', months: 'mo', days: 'd', registered: 'registered', remaining: 'remaining',
                    errorPrefix: 'Error', requestFailed: 'Request failed'
                },
                'ru': {
                    title: 'WHOIS Поиск', inputPlaceholder: 'Введите домен или IP', search: 'Поиск', searching: 'Поиск...',
                    history: 'История', clearHistory: 'Очистить', clearConfirm: 'Очистить всю историю?',
                    emptyTitle: 'Начните первый поиск', emptyDesc: 'Введите домен или IP для просмотра WHOIS',
                    overview: 'Обзор', rawInfo: 'Оригинал WHOIS', expandRaw: 'Развернуть', collapseRaw: 'Свернуть',
                    noHistory: 'История пуста',
                    domainName: 'Домен', registrar: 'Регистратор', whoisServer: 'WHOIS сервер',
                    updatedDate: 'Обновлён', creationDate: 'Создан', expiryDate: 'Истекает',
                    status: 'Статус', nameServers: 'DNS серверы', dnssec: 'DNSSEC',
                    registrant: 'Регистрант', registrantEmail: 'Email регистранта', registryDomainId: 'ID реестра',
                    years: 'л', months: 'мес', days: 'д', registered: 'зарегистрирован', remaining: 'осталось',
                    errorPrefix: 'Ошибка', requestFailed: 'Ошибка запроса'
                },
                'es': {
                    title: 'Consulta WHOIS', inputPlaceholder: 'Ingrese dominio o IP', search: 'Buscar', searching: 'Buscando...',
                    history: 'Historial', clearHistory: 'Limpiar', clearConfirm: '¿Limpiar todo el historial?',
                    emptyTitle: 'Inicie su primera consulta', emptyDesc: 'Ingrese dominio o IP para ver WHOIS',
                    overview: 'Resumen', rawInfo: 'WHOIS original', expandRaw: 'Expandir', collapseRaw: 'Contraer',
                    noHistory: 'Sin historial',
                    domainName: 'Dominio', registrar: 'Registrador', whoisServer: 'Servidor WHOIS',
                    updatedDate: 'Actualizado', creationDate: 'Creado', expiryDate: 'Expira',
                    status: 'Estado', nameServers: 'Servidores DNS', dnssec: 'DNSSEC',
                    registrant: 'Registrante', registrantEmail: 'Email registrante', registryDomainId: 'ID registro',
                    years: 'a', months: 'm', days: 'd', registered: 'registrado', remaining: 'restante',
                    errorPrefix: 'Error', requestFailed: 'Error de solicitud'
                }
            };

            let currentLang = localStorage.getItem(STORAGE_LANG) || detectLang();
            let currentXhr = null;

            const $form = $('#whoisForm');
            const $input = $('#domainInput');
            const $submit = $('#submitBtn');
            const $spinner = $('#spinner');
            const $clearBtn = $('#clearBtn');
            const $result = $('#resultArea');
            const $historyList = $('#historyList');
            const $historyListMobile = $('#historyListMobile');
            const $drawer = $('#historyDrawer');
            const $overlay = $('#drawerOverlay');

            function detectLang() {
                const lang = navigator.language || navigator.userLanguage;
                return i18n[lang] ? lang : (i18n[lang.split('-')[0]] ? lang.split('-')[0] : 'zh-CN');
            }

            function t(key) { return (i18n[currentLang] && i18n[currentLang][key]) || key; }

            function applyI18n() {
                $('[data-i18n]').each(function () {
                    const $el = $(this);
                    const key = $el.data('i18n');
                    if (key.indexOf('[placeholder]') === 0) {
                        $el.attr('placeholder', t(key.replace('[placeholder]', '')));
                    } else {
                        $el.text(t(key));
                    }
                });
                $('#langSelect').val(currentLang);
            }

            // HTML 转义，防止 WHOIS 数据注入
            function esc(str) {
                if (str === null || str === undefined) return '';
                return String(str)
                    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            }

            // 日期格式化为本地时区
            function formatDate(s) {
                const d = new Date(s);
                if (isNaN(d.getTime())) return s;
                const pad = n => String(n).padStart(2, '0');
                const off = -d.getTimezoneOffset() / 60;
                const sign = off >= 0 ? '+' : '-';
                return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())} (UTC${sign}${Math.abs(off)})`;
            }

            // 计算时间跨度
            function timeSpan(dateStr, type) {
                if (!dateStr) return '';
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return '';
                const now = new Date();
                const diff = type === 'remaining' ? (d - now) : (now - d);
                const days = Math.max(0, Math.floor(diff / 86400000));
                let num, unit;
                if (days >= 365) { num = Math.floor(days / 365); unit = 'years'; }
                else if (days >= 30) { num = Math.floor(days / 30); unit = 'months'; }
                else { num = days; unit = 'days'; }
                const cls = type === 'remaining' ? 'pill green' : 'pill';
                return `<span class="${cls}">${t(type === 'remaining' ? 'remaining' : 'registered')} ${num} ${t(unit)}</span>`;
            }

            // 从 WHOIS 原文提取结构化字段
            // rawDates 保留原始日期字符串，用于时间跨度计算；info 中存格式化后的显示值
            function parseWhois(raw) {
                const lines = raw.split('\n');
                const info = {};
                const rawDates = {};
                lines.forEach(line => {
                    const idx = line.indexOf(':');
                    if (idx === -1) return;
                    const key = line.slice(0, idx).trim().toLowerCase();
                    const val = line.slice(idx + 1).trim();
                    if (!val) return;
                    switch (key) {
                        case 'domain name': case 'domain': case '域名': info.domainName = val; break;
                        case 'registrar': case 'sponsoring registrar': case '注册商': info.registrar = val; break;
                        case 'whois server': info.whoisServer = val; break;
                        case 'updated date': case '更新日': info.updatedDate = formatDate(val); rawDates.updatedDate = val; break;
                        case 'creation date': case 'registration time': case '注册日': info.creationDate = formatDate(val); rawDates.creationDate = val; break;
                        case 'registry expiry date': case 'expiration time': info.expiryDate = formatDate(val); rawDates.expiryDate = val; break;
                        case 'registry domain id': info.registryDomainId = val; break;
                        case 'domain status': case 'status': case '状态':
                            info.status = (info.status ? info.status + '\n' : '') + val; break;
                        case 'name server': case 'nserver':
                            info.nameServers = (info.nameServers ? info.nameServers + '\n' : '') + val; break;
                        case 'dnssec': info.dnssec = val; break;
                        case 'registrant': case '注册人': info.registrant = val; break;
                        case 'registrant email': case 'registrant contact email': info.registrantEmail = val; break;
                    }
                });
                return { info: info, rawDates: rawDates };
            }

            // 缓存最近一次查询的响应，供语言切换时重新渲染
            let lastResponse = null;

            function renderResult(response) {
                lastResponse = response;
                if (response.error) {
                    $result.html(`<div class="error-box"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>${esc(t('errorPrefix'))}: ${esc(response.error)}</span></div>`);
                    return;
                }
                if (!response.whois) {
                    $result.html(`<div class="error-box"><span>${esc(t('errorPrefix'))}: empty response</span></div>`);
                    return;
                }
                const { info, rawDates } = parseWhois(response.whois);
                const rows = Object.entries(info).map(([key, val]) => {
                    let display = esc(val);
                    if (key === 'domainName') display += timeSpan(rawDates.creationDate, 'registered');
                    if (key === 'expiryDate') display += timeSpan(rawDates.expiryDate, 'remaining');
                    return `<div class="info-row"><div class="info-key">${esc(t(key))}</div><div class="info-val">${display}</div></div>`;
                }).join('');

                $result.html(`
                    <div class="overview-card">
                        <div class="card-head">
                            <h3>${esc(t('overview'))}</h3>
                            ${info.domainName ? `<span class="badge">${esc(info.domainName)}</span>` : ''}
                        </div>
                        <div class="info-grid">${rows || `<div class="info-row"><div class="info-val">${esc(t('noHistory'))}</div></div>`}</div>
                    </div>
                    <div class="raw-card">
                        <div class="card-head">
                            <h3>${esc(t('rawInfo'))}</h3>
                            <button class="raw-toggle" id="rawToggle">
                                <span id="rawToggleText">${esc(t('expandRaw'))}</span>
                                <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                            </button>
                        </div>
                        <div class="raw-body" id="rawBody"><pre class="raw-content">${esc(response.whois)}</pre></div>
                    </div>
                `);

                $('#rawToggle').on('click', function () {
                    const $body = $('#rawBody');
                    const open = $body.hasClass('open');
                    $body.toggleClass('open', !open);
                    $(this).toggleClass('expanded', !open);
                    $('#rawToggleText').text(open ? t('expandRaw') : t('collapseRaw'));
                });
            }

            function setLoading(loading) {
                $submit.prop('disabled', loading);
                $spinner.css('display', loading ? 'inline-block' : 'none');
                $submit.find('.label').text(loading ? t('searching') : t('search'));
            }

            function lookup(domain) {
                if (currentXhr) currentXhr.abort();
                setLoading(true);
                currentXhr = $.ajax({
                    url: 'whois.php',
                    method: 'GET',
                    data: { domain: domain },
                    dataType: 'json',
                    success: function (resp) { renderResult(resp); addHistory(domain); },
                    error: function (xhr, status) {
                        if (status === 'abort') return;
                        renderResult({ error: t('requestFailed') + ' (' + (xhr.status || status) + ')' });
                    },
                    complete: function () { currentXhr = null; setLoading(false); }
                });
            }

            $form.on('submit', function (e) {
                e.preventDefault();
                const domain = $input.val().trim();
                if (!domain) return;
                lookup(domain);
            });

            $input.on('input', function () {
                $clearBtn.toggleClass('visible', !!$(this).val());
            });

            $clearBtn.on('click', function () {
                $input.val('').focus();
                $clearBtn.removeClass('visible');
            });

            // 历史
            function getHistory() {
                try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
                catch (e) { return []; }
            }

            function addHistory(domain) {
                let history = getHistory().filter(item => item.domain !== domain);
                history.unshift({ domain: domain, time: Date.now() });
                history = history.slice(0, MAX_HISTORY);
                localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
                renderHistory();
            }

            function renderHistory() {
                const history = getHistory();
                const render = ($list) => {
                    if (!history.length) {
                        $list.html(`<li class="history-empty">${esc(t('noHistory'))}</li>`);
                        return;
                    }
                    $list.html(history.map(item => `
                        <li class="history-item" data-domain="${esc(item.domain)}">
                            <span class="history-domain">${esc(item.domain)}</span>
                            <span class="history-time">${formatRelative(item.time)}</span>
                        </li>
                    `).join(''));
                };
                render($historyList);
                render($historyListMobile);
            }

            function formatRelative(ts) {
                const diff = Date.now() - ts;
                const min = Math.floor(diff / 60000);
                if (min < 1) return 'now';
                if (min < 60) return min + 'm';
                const hr = Math.floor(min / 60);
                if (hr < 24) return hr + 'h';
                const d = Math.floor(hr / 24);
                return d + 'd';
            }

            $(document).on('click', '.history-item', function () {
                const domain = $(this).data('domain');
                $input.val(domain);
                $clearBtn.addClass('visible');
                closeDrawer();
                lookup(domain);
                $('html, body').animate({ scrollTop: 0 }, 200);
            });

            $('#clearHistory, #clearHistoryMobile').on('click', function () {
                if (!confirm(t('clearConfirm'))) return;
                localStorage.removeItem(HISTORY_KEY);
                renderHistory();
            });

            // 移动端抽屉
            $('#historyToggle').on('click', openDrawer);
            $overlay.on('click', closeDrawer);

            function openDrawer() {
                $drawer.addClass('open');
                $overlay.addClass('open');
            }
            function closeDrawer() {
                $drawer.removeClass('open');
                $overlay.removeClass('open');
            }

            // 语言切换
            $('#langSelect').on('change', function () {
                currentLang = $(this).val();
                localStorage.setItem(STORAGE_LANG, currentLang);
                applyI18n();
                // 若已有结果，重新渲染以更新字段标签与时间跨度文案
                if (lastResponse) renderResult(lastResponse);
            });

            // 初始化
            applyI18n();
            renderHistory();
        });
    </script>
</body>

</html>

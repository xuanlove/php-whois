<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">WHOIS 查询</title>
    <link rel="stylesheet" href="https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/tailwindcss/2.2.19/tailwind.min.css">
    <script src="https://lf9-cdn-tos.bytecdntp.com/cdn/expire-1-M/dom-to-image/2.6.0/dom-to-image.min.js"></script>
    <script src="https://lf9-cdn-tos.bytecdntp.com/cdn/expire-1-M/clipboard.js/2.0.10/clipboard.min.js"></script>
    <script src="https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/i18next/21.6.12/i18next.min.js"></script>
    <style>
        /* ===== 主题变量 ===== */
        :root {
            --bg-app: #f1f5f9;
            --bg-gradient-1: #e0e7ff;
            --bg-gradient-2: #f1f5f9;
            --bg-gradient-3: #fae8ff;
            --card-bg: rgba(255, 255, 255, 0.75);
            --card-border: rgba(226, 232, 240, 0.8);
            --card-shadow: 0 8px 32px rgba(99, 102, 241, 0.08);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-light: rgba(99, 102, 241, 0.1);
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --input-bg: rgba(255, 255, 255, 0.9);
            --input-border: #e2e8f0;
            --input-focus-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
            --secondary-card-bg: rgba(248, 250, 252, 0.8);
            --secondary-card-border: rgba(226, 232, 240, 0.6);
            --tag-bg: rgba(99, 102, 241, 0.08);
            --tag-text: #4f46e5;
            --divider: rgba(226, 232, 240, 0.8);
            --scrollbar-thumb: #cbd5e1;
            --scrollbar-track: transparent;
            --overlay: rgba(15, 23, 42, 0.4);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        html.dark {
            --bg-app: #0f172a;
            --bg-gradient-1: #1e1b4b;
            --bg-gradient-2: #0f172a;
            --bg-gradient-3: #312e81;
            --card-bg: rgba(30, 41, 59, 0.75);
            --card-border: rgba(51, 65, 85, 0.5);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            --accent: #818cf8;
            --accent-hover: #6366f1;
            --accent-light: rgba(129, 140, 248, 0.15);
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --input-bg: rgba(15, 23, 42, 0.6);
            --input-border: #334155;
            --input-focus-shadow: 0 0 0 4px rgba(129, 140, 248, 0.15);
            --secondary-card-bg: rgba(15, 23, 42, 0.5);
            --secondary-card-border: rgba(51, 65, 85, 0.4);
            --tag-bg: rgba(129, 140, 248, 0.15);
            --tag-text: #a5b4fc;
            --divider: rgba(51, 65, 85, 0.5);
            --scrollbar-thumb: #475569;
            --scrollbar-track: transparent;
            --overlay: rgba(0, 0, 0, 0.6);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg-app);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* ===== 背景装饰 ===== */
        .app-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse 80% 50% at 20% 0%, var(--bg-gradient-1), transparent),
                radial-gradient(ellipse 60% 50% at 80% 100%, var(--bg-gradient-3), transparent),
                var(--bg-gradient-2);
        }

        /* ===== 玻璃态卡片 ===== */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: var(--card-shadow);
        }

        /* ===== 现代输入框 ===== */
        .modern-input {
            background: var(--input-bg);
            border: 1.5px solid var(--input-border);
            color: var(--text-primary);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .modern-input::placeholder {
            color: var(--text-muted);
        }

        .modern-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: var(--input-focus-shadow);
        }

        /* ===== 渐变按钮 ===== */
        .gradient-btn {
            background: var(--accent-gradient);
            color: #fff;
            transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
            box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
        }

        .gradient-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        .gradient-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .gradient-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ===== 图标按钮 ===== */
        .icon-btn {
            color: var(--text-secondary);
            transition: color 0.2s, background 0.2s;
            border-radius: 10px;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .icon-btn:hover {
            color: var(--accent);
            background: var(--accent-light);
        }

        /* ===== 信息卡片 ===== */
        .info-card {
            background: var(--secondary-card-bg);
            border: 1px solid var(--secondary-card-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* ===== 字段行 ===== */
        .field-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 10px 14px;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .field-row:hover {
            background: var(--accent-light);
        }

        @media (min-width: 640px) {
            .field-row {
                flex-direction: row;
                align-items: center;
                gap: 12px;
            }
        }

        .field-label {
            display: inline-flex;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--tag-text);
            background: var(--tag-bg);
            padding: 4px 10px;
            border-radius: 8px;
            white-space: nowrap;
            flex-shrink: 0;
            align-self: flex-start;
        }

        @media (min-width: 640px) {
            .field-label {
                min-width: 120px;
                justify-content: center;
                align-self: center;
            }
        }

        .field-value {
            color: var(--text-primary);
            word-break: break-all;
            font-size: 14px;
            line-height: 1.6;
            flex: 1;
        }

        /* ===== 标签徽章 ===== */
        .time-badge {
            display: inline-flex;
            align-items: center;
            font-size: 11px;
            font-weight: 600;
            color: #fff;
            padding: 2px 8px;
            border-radius: 6px;
            margin-left: 6px;
            vertical-align: middle;
        }

        .time-badge.green {
            background: var(--success);
        }

        .time-badge.blue {
            background: var(--accent);
        }

        /* ===== 历史项 ===== */
        .history-item {
            background: var(--secondary-card-bg);
            border: 1px solid var(--secondary-card-border);
            padding: 10px 12px;
            border-radius: 12px;
            transition: transform 0.15s, border-color 0.2s;
        }

        .history-item:hover {
            transform: translateX(2px);
            border-color: var(--accent);
        }

        /* ===== 滚动条 ===== */
        .scroll-area {
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
        }

        .scroll-area::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .scroll-area::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
        }

        .scroll-area::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 10px;
        }

        .scroll-area::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* ===== 加载动画 ===== */
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-spinner {
            animation: spin 0.8s linear infinite;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeInUp 0.3s ease-out;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--text-primary);
            color: var(--bg-app);
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== 移动端历史抽屉 ===== */
        .history-drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 70vh;
            background: var(--card-bg);
            border-top: 1px solid var(--card-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px 20px 0 0;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 40;
            box-shadow: 0 -8px 32px rgba(0, 0, 0, 0.15);
        }

        .history-drawer.open {
            transform: translateY(0);
        }

        .drawer-handle {
            width: 40px;
            height: 4px;
            background: var(--text-muted);
            border-radius: 2px;
            margin: 10px auto;
            opacity: 0.5;
        }

        @media (max-width: 640px) {
            .result-container {
                padding-bottom: 72px;
            }
        }

        /* ===== 链接 ===== */
        .link-btn {
            color: var(--accent);
            font-size: 13px;
            font-weight: 500;
            transition: color 0.2s;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .link-btn:hover {
            color: var(--accent-hover);
        }

        /* ===== JSON 代码块 ===== */
        .json-block {
            background: var(--secondary-card-bg);
            border: 1px solid var(--secondary-card-border);
            border-radius: 12px;
            padding: 14px;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            font-size: 12px;
            color: var(--text-secondary);
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>

<body>
    <div class="app-bg"></div>

    <!-- 顶部导航栏 -->
    <header class="glass-card sticky top-0 z-30 px-4 sm:px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background: var(--accent-gradient);">
                <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" />
                </svg>
            </div>
            <h1 class="text-lg sm:text-xl font-bold" style="color: var(--text-primary);" data-i18n="title">WHOIS 查询</h1>
        </div>
        <div class="flex items-center gap-2">
            <button type="button" id="historyToggle" class="icon-btn p-2 sm:hidden" title="历史记录">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </button>
            <button type="button" id="themeToggle" class="icon-btn p-2" title="切换主题">
                <svg id="themeIconSun" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                </svg>
                <svg id="themeIconMoon" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />

                <option value="zh-CN">简体中文</option>

                <option value="ru">Русский</option>
                <option value="es">Español</option>
            </select>

    </header>

    <!-- 主内容区 -->
    <main class="flex max-w-6xl mx-auto px-0 sm:px-4 py-0 sm:py-6 gap-0 sm:gap-6 h-[calc(100vh-64px)]">
        <!-- 查询区 -->
        <div class="glass-card flex flex-col flex-1 w-full rounded-none sm:rounded-2xl overflow-hidden">
            <div class="p-4 sm:p-6 flex flex-col h-full">
                <!-- 搜索表单 -->
                <form id="whois-form" class="mb-4">
                    <div class="flex relative gap-2">

                            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5" style="color: var(--text-muted);" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                            <input type="text" id="domain" name="domain" required placeholder="请输入IP或者域名"

                                class="modern-input w-full pl-11 pr-10 py-3 rounded-xl text-sm">
                            <button type="button" id="clear-input"
                                class="absolute right-3 top-1/2 -translate-y-1/2 icon-btn p-1 hidden">

                            </button>
                        </div>
                        <button type="submit" id="submit-btn"
                            class="gradient-btn flex items-center justify-center px-5 sm:px-6 rounded-xl text-sm font-semibold whitespace-nowrap">

                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>

                <!-- 结果区 -->
                <div id="resultDiv" class="hidden flex-1 overflow-hidden">
                    <div class="h-full overflow-y-auto scroll-area result-container pb-16 sm:pb-4">
                        <div id="importantInfo"></div>

        </div>

        <!-- 历史记录（桌面） -->
        <aside id="history" class="glass-card hidden sm:flex flex-col rounded-2xl overflow-hidden flex-shrink-0" style="width: 280px;">
            <h2 class="text-base font-semibold px-5 pt-5 pb-3 flex items-center gap-2" style="color: var(--text-primary);">
                <svg class="w-4 h-4" style="color: var(--accent);" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span data-i18n="recentSearches">最近查询</span>

    <!-- 历史记录抽屉（移动端） -->
    <div id="historyDrawer" class="history-drawer sm:hidden flex flex-col">
        <div class="drawer-handle"></div>
        <div class="flex items-center justify-between px-5 pb-3">
            <h2 class="text-base font-semibold flex items-center gap-2" style="color: var(--text-primary);">
                <svg class="w-4 h-4" style="color: var(--accent);" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span data-i18n="recentSearches">最近查询</span>
            </h2>
            <button type="button" id="closeDrawerBtn" class="icon-btn p-1.5">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="flex-1 overflow-y-auto scroll-area px-4 pb-6 max-h-[50vh]">
            <ul id="history-list-mobile" class="space-y-2"></ul>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ===== 原生 JS 工具函数 =====
        const $ = (sel) => document.querySelector(sel);
        const $$ = (sel) => document.querySelectorAll(sel);

        document.addEventListener('DOMContentLoaded', function () {
            const HISTORY_KEY = 'whoisHistory';
            const THEME_KEY = 'whoisTheme';
            const MAX_HISTORY = 500;

            const form = $('#whois-form');
            const domainInput = $('#domain');
            const submitBtn = $('#submit-btn');
            const resultDiv = $('#resultDiv');
            const importantInfo = $('#importantInfo');
            const originalInfo = $('#originalInfo');
            const historyList = $('#history-list');
            const historyListMobile = $('#history-list-mobile');
            const clearInputBtn = $('#clear-input');
            const historyDrawer = $('#historyDrawer');

            function init() {
                bindEvents();
                initTheme();
                initClipboard();
                checkUrlForDomain();
                updateSearchHistory();
                toggleClearButton();
                initI18n();
            }

            function bindEvents() {
                form.addEventListener('submit', handleFormSubmit);
                document.addEventListener('click', function (e) {
                    if (e.target.closest('.search-again')) handleSearchAgain(e);
                    if (e.target.closest('#saveScreenshot')) handleSaveScreenshot();
                });
                domainInput.addEventListener('input', toggleClearButton);
                clearInputBtn.addEventListener('click', clearInput);
                document.addEventListener('keydown', handleGlobalKeydown);
                $('#languageSelect').addEventListener('change', handleLanguageChange);
                $('#themeToggle').addEventListener('click', toggleTheme);
                $('#historyToggle').addEventListener('click', () => historyDrawer.classList.add('open'));
                $('#closeDrawerBtn').addEventListener('click', () => historyDrawer.classList.remove('open'));
            }

            // ===== 暗黑模式 =====
            function initTheme() {
                const saved = localStorage.getItem(THEME_KEY);
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const isDark = saved ? saved === 'dark' : prefersDark;
                applyTheme(isDark);
            }

            function applyTheme(isDark) {
                const html = document.documentElement;
                const sunIcon = $('#themeIconSun');
                const moonIcon = $('#themeIconMoon');
                if (isDark) {
                    html.classList.add('dark');
                    sunIcon.classList.remove('hidden');
                    moonIcon.classList.add('hidden');
                } else {
                    html.classList.remove('dark');
                    sunIcon.classList.add('hidden');
                    moonIcon.classList.remove('hidden');
                }
            }

            function toggleTheme() {
                const isDark = !document.documentElement.classList.contains('dark');
                applyTheme(isDark);
                localStorage.setItem(THEME_KEY, isDark ? 'dark' : 'light');
            }

            function handleFormSubmit(e) {
                e.preventDefault();
                const domain = domainInput.value.trim();
                if (!domain) return;
                performWhoisLookup(domain);
            }

            function handleSearchAgain(e) {
                const btn = e.target.closest('.search-again');
                const domain = btn.dataset.domain;
                performWhoisLookup(domain);
                historyDrawer.classList.remove('open');
            }

            function performWhoisLookup(domain) {
                updateButtonState(true);
                updateUrl(domain);
                domainInput.value = domain;
                toggleClearButton();

                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 15000);

                fetch('whois.php?domain=' + encodeURIComponent(domain), {
                    signal: controller.signal,
                    headers: { 'Accept': 'application/json' }
                })
                    .then(res => res.json())
                    .then(response => handleWhoisResponse(response))
                    .catch(err => {
                        const msg = err.name === 'AbortError' ? 'timeout' : err.message;
                        showError(i18next.t('requestFailed', { status: escapeHtml(msg) }));
                    })
                    .finally(() => {
                        clearTimeout(timeoutId);
                        updateButtonState(false);
                        updateContent();
                    });
            }

            function handleWhoisResponse(response) {
                if (response.rdap) {
                    const { importantInfoHtml, originalInfoHtml } = formatRdapInfo(response.rdap);
                    importantInfo.innerHTML = importantInfoHtml;
                    originalInfo.innerHTML = originalInfoHtml;

                    // 该后缀无 RDAP 服务，显示 ICANN 查询链接
                    const fallbackUrl = escapeHtml(response.fallback);
                    const errorMsg = response.error ? escapeHtml(response.error) : '';
                    importantInfo.innerHTML = `
                        <div class="info-card rounded-2xl p-6 sm:p-8 mb-4 text-center fade-in">
                            <div class="w-14 h-14 mx-auto mb-4 rounded-full flex items-center justify-center" style="background: rgba(245, 158, 11, 0.12);">

                                <svg class="ml-1.5 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />

                    originalInfo.innerHTML = '';
                    resultDiv.classList.remove('hidden');
                    resultDiv.classList.add('fade-in');
                    setTimeout(() => resultDiv.classList.remove('fade-in'), 300);
                    updateSearchHistory(domainInput.value.trim());
                    updateContent();
                } else if (response.error) {
                    showError(i18next.t('error', { message: escapeHtml(response.error) }));
                }
            }

            function getLabel(key) {
                return i18next.t(key, { defaultValue: key });
            }

            // HTML 转义，防止 XSS
            function escapeHtml(text) {
                if (text == null) return '';
                return String(text).replace(/[&<>"']/g, function (c) {
                    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
                });
            }

            // 从 vcardArray 提取联系人信息（RFC 7483 jCard 格式）
            function extractVcard(vcardArray) {
                const result = {};
                if (!Array.isArray(vcardArray) || vcardArray.length < 2) return result;
                const entries = vcardArray[1];
                if (!Array.isArray(entries)) return result;
                entries.forEach(function (entry) {
                    if (!Array.isArray(entry) || entry.length < 4) return;
                    const key = entry[0];
                    const value = entry[3];
                    if (key === 'fn') result.fn = value;
                    else if (key === 'email') result.email = value;
                    else if (key === 'org') result.org = value;
                });
                return result;
            }

            // 格式化 RDAP 日期为本地时区显示
            function formatDate(dateString) {
                if (!dateString) return '';
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return escapeHtml(dateString);
                return escapeHtml(date.toLocaleString());
            }

            // 解析 RDAP JSON 响应，生成概览和原始信息 HTML
            function formatRdapInfo(rdap) {
                const temp = {};
                const rawDates = {}; // 保存原始日期用于时间跨度计算

                // 域名（优先显示 Unicode 形式）
                temp.domainName = escapeHtml(rdap.unicodeName || rdap.ldhName || '');

                // 注册局域名 ID
                if (rdap.handle) temp.registryDomainId = escapeHtml(rdap.handle);

                // 事件：注册、过期、更新
                if (Array.isArray(rdap.events)) {
                    rdap.events.forEach(function (ev) {
                        if (!ev.eventDate) return;
                        if (ev.eventAction === 'registration') {
                            rawDates.creationDate = ev.eventDate;
                            temp.creationDate = formatDate(ev.eventDate);
                        } else if (ev.eventAction === 'expiration') {
                            rawDates.expiryDate = ev.eventDate;
                            temp.expiryDate = formatDate(ev.eventDate);
                        } else if (ev.eventAction === 'last changed') {
                            temp.updatedDate = formatDate(ev.eventDate);
                        }
                    });
                }

                // 状态
                if (Array.isArray(rdap.status) && rdap.status.length) {
                    temp.status = rdap.status.map(escapeHtml).join('<br>');
                }

                // 域名服务器
                if (Array.isArray(rdap.nameservers) && rdap.nameservers.length) {
                    const ns = rdap.nameservers.map(function (n) {
                        return n.unicodeName || n.ldhName || '';
                    }).filter(Boolean);
                    if (ns.length) temp.nameServers = ns.map(escapeHtml).join('<br>');
                }

                // DNSSEC
                if (rdap.secureDNS && typeof rdap.secureDNS.delegationSigned !== 'undefined') {
                    const signed = rdap.secureDNS.delegationSigned;
                    const key = signed ? 'dnssecSigned' : 'dnssecUnsigned';
                    temp.dnssec = `<span data-i18n="${key}">${i18next.t(key, { defaultValue: signed ? '已签名' : '未签名' })}</span>`;
                }

                // 实体：注册商、注册人（含嵌套实体）
                if (Array.isArray(rdap.entities)) {
                    rdap.entities.forEach(function (entity) {
                        const roles = entity.roles || [];
                        const vcard = extractVcard(entity.vcardArray);
                        if (roles.includes('registrar')) {
                            if (vcard.fn) temp.registrar = escapeHtml(vcard.fn);
                            if (entity.handle) temp.ianaId = escapeHtml(entity.handle);
                        }
                        if (roles.includes('registrant')) {
                            if (vcard.fn) temp.registrant = escapeHtml(vcard.fn);
                            if (vcard.email) temp.registrantEmail = escapeHtml(vcard.email);
                        }
                        // 嵌套实体（注册人可能在注册商的子实体中）
                        if (Array.isArray(entity.entities)) {
                            entity.entities.forEach(function (sub) {
                                const subRoles = sub.roles || [];
                                const subVcard = extractVcard(sub.vcardArray);
                                if (subRoles.includes('registrant')) {
                                    if (subVcard.fn) temp.registrant = escapeHtml(subVcard.fn);
                                    if (subVcard.email) temp.registrantEmail = escapeHtml(subVcard.email);
                                }
                            });
                        }
                    });
                }

                // 按固定顺序构建显示字段
                const fieldOrder = ['domainName', 'registrar', 'ianaId', 'registryDomainId',
                    'creationDate', 'expiryDate', 'updatedDate', 'status',
                    'nameServers', 'dnssec', 'registrant', 'registrantEmail'];
                const info = {};
                fieldOrder.forEach(function (key) {
                    if (temp[key]) info[key] = temp[key];
                });

                const registrationPeriod = calculatePeriod(rawDates.creationDate, 'registrationPeriod');
                const remainingTime = calculatePeriod(rawDates.expiryDate, 'remainingTime');

                // 生成重要信息 HTML
                let importantInfoHtml = `
                    <div id="importantInfoCard" class="info-card rounded-2xl p-4 sm:p-6 mb-4 fade-in">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-base font-bold flex items-center gap-2" style="color: var(--text-primary);">
                                <span class="w-1 h-5 rounded-full" style="background: var(--accent-gradient);"></span>
                                <span data-i18n="whoisOverview">WHOIS 信息概览</span>
                            </h3>
                            <button id="saveScreenshot" class="icon-btn p-2" title="截图">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                            </button>
                        </div>
                        <div class="space-y-1">
                            ${Object.entries(info).map(([key, value]) => `
                                <div class="field-row">
                                    <span class="field-label" data-i18n="${key}">${getLabel(key)}</span>
                                    <span class="field-value">
                                        ${value}
                                        ${key === 'domainName' ? registrationPeriod : ''}
                                        ${key === 'expiryDate' ? remainingTime : ''}
                                    </span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;

                // 生成原始 RDAP JSON 信息 HTML
                const rawJson = escapeHtml(JSON.stringify(rdap, null, 2));
                let originalInfoHtml = `
                    <div class="info-card rounded-2xl p-4 sm:p-6 fade-in">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="text-base font-bold flex items-center gap-2" style="color: var(--text-primary);">
                                <span class="w-1 h-5 rounded-full" style="background: var(--accent-gradient);"></span>
                                <span data-i18n="originalRdap">RDAP 原始信息</span>
                            </h3>
                            <button id="copyOriginalInfo" class="icon-btn p-2" data-clipboard-target="#originalInfoContent" title="复制">
                                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                                </svg>
                            </button>
                        </div>
                        <div class="json-block scroll-area" id="originalInfoContent">${rawJson}</div>
                    </div>
                `;

                return { importantInfoHtml, originalInfoHtml };
            }

            // 计算时间跨度（注册至今 / 距过期剩余）
            function calculatePeriod(dateString, type) {
                if (!dateString) return '';

                const date = new Date(dateString);
                if (isNaN(date.getTime())) return '';
                const currentDate = new Date();
                const diffTime = Math.abs(type === 'remainingTime' ? date - currentDate : currentDate - date);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                let time, unit;
                if (diffDays >= 365) {
                    time = Math.floor(diffDays / 365);
                    unit = 'years';
                } else if (diffDays >= 30) {
                    time = Math.floor(diffDays / 30);
                    unit = 'months';
                } else {
                    time = diffDays;
                    unit = 'days';
                }

                return `<span class="time-badge ${type === 'remainingTime' ? 'green' : 'blue'}" data-i18n="${type}" data-time="${time}" data-unit="${unit}"></span>`;
            }

            function updateSearchHistory(domain) {
                let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
                if (domain && domain.trim()) {
                    history = [domain, ...history.filter(item => item !== domain)].slice(0, MAX_HISTORY);
                    localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
                }
                renderHistory(history);
            }

            function renderHistory(history) {
                const historyHtml = history.length
                    ? history.map(item => `
                        <li class="history-item">
                            <span class="text-xs sm:text-sm block mb-1.5" style="color: var(--text-secondary);">${escapeHtml(item)}</span>
                            <button class="search-again link-btn flex items-center gap-1" data-domain="${escapeHtml(item)}">
                                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                </svg>
                                <span data-i18n="searchAgain">再次查询</span>
                            </button>
                        </li>
                    `).join('')
                    : `<li class="text-xs sm:text-sm text-center py-4" style="color: var(--text-muted);" data-i18n="noHistory">暂无历史查询记录</li>`;
                historyList.innerHTML = historyHtml;
                historyListMobile.innerHTML = historyHtml;
            }

            function updateButtonState(isLoading) {
                const submitText = submitBtn.querySelector('span');
                const spinner = submitBtn.querySelector('svg');
                submitBtn.disabled = isLoading;

            function handleSaveScreenshot() {
                const element = document.getElementById('importantInfoCard');
                const currentDomain = window.location.hostname;
                const currentQueryDomain = domainInput.value.trim();
                const saveBtn = $('#saveScreenshot');

                // 临时隐藏截图按钮
                saveBtn.style.display = 'none';

                domtoimage.toPng(element, {
                    quality: 1,
                    bgcolor: '#ffffff'
                })
                    .then(function (dataUrl) {
                        const img = new Image();
                        img.onload = function () {
                            const canvas = document.createElement('canvas');
                            canvas.width = img.width;
                            canvas.height = img.height;
                            const ctx = canvas.getContext('2d');

                            ctx.drawImage(img, 0, 0);

                            ctx.font = '12px Arial';
                            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                            const watermarkText = '© ' + new Date().getFullYear() + ' ' + currentDomain;
                            const textWidth = ctx.measureText(watermarkText).width;
                            ctx.fillText(watermarkText, canvas.width - textWidth - 10, canvas.height - 10);

                            const link = document.createElement('a');
                            link.download = `whois_${currentQueryDomain}.png`;
                            link.href = canvas.toDataURL('image/png');
                            link.click();

                            saveBtn.style.display = '';
                        };
                        img.src = dataUrl;
                    })
                    .catch(function (error) {
                        console.error('截图失败:', error);
                        showToast('screenshotFailed');
                        saveBtn.style.display = '';
                    });
            }

            function checkUrlForDomain() {

            function updateContent() {
                $$('[data-i18n]').forEach(function (el) {
                    const key = el.getAttribute('data-i18n');
                    if (key === 'remainingTime' || key === 'registrationPeriod') {
                        const time = el.getAttribute('data-time');
                        const unit = el.getAttribute('data-unit');
                        el.innerHTML = i18next.t(key, { time: time, unit: i18next.t(unit) });
                    } else if (key && key.indexOf('[placeholder]') === 0) {
                        const placeholderKey = key.replace('[placeholder]', '');
                        el.setAttribute('placeholder', i18next.t(placeholderKey));
                    } else if (key) {
                        el.textContent = i18next.t(key);
                    }
                });
            }

            function handleLanguageChange() {
                i18next.changeLanguage(this.value, function () {
                    updateContent();
                });
            }

            init();
        });
